services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: loose
      POSTGRES_PASSWORD: loose
      POSTGRES_DB: loose
    # Host-published on 5433 to avoid clashing with a local Postgres on 5432.
    # The app connects over the compose network (postgres:5432), so this is debug-only.
    ports: ["5433:5432"]
    volumes: ["loose_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loose -d loose"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      target: server
    environment:
      PORT: "8787"
      # Real Postgres store + Redis pubsub — migrations & seed run automatically on boot.
      DATABASE_URL: postgres://loose:loose@postgres:5432/loose
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
    ports: ["8787:8787"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      target: web
      args:
        # Baked into the client bundle; must be reachable from the *browser* (host ports).
        VITE_HTTP_URL: http://localhost:8787
        VITE_WS_URL: ws://localhost:8787/ws
    ports: ["5173:5173"]
    depends_on:
      server:
        condition: service_healthy

volumes:
  loose_pg:
